<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>602-從檔案管理員拖拉檔案進來</title>

    <style>
      .container {
        position: absolute;
        display: flex;
        flex-wrap: wrap;
        width: 800px;
        height: 600px;
        background-color: #b0e9ff;
      }
      .box {
        box-sizing: border-box;
        width: 200px;
        min-width: 200px;
        height: 200px;
        border: 1px solid gray;
      }
      .box img {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      class="container"
      onclick="fileFiled.click()"
      title="從檔案管理員拖拉檔案進來"
    ></div>
    <script>
      const container = document.querySelector(".container");

      container.addEventListener("dragover", (e) => e.preventDefault());
      container.addEventListener("drop", (e) => {
        e.preventDefault(); // 不擋掉，瀏覽器會直接開啟圖檔

        for (const f of e.dataTransfer.files) {
          if (!f.type.startsWith("image/")) continue;

          const url = URL.createObjectURL(f); // 同步取得 blob: 暫存 URL
          container.innerHTML += `
            <div class="box">
              <img src="${url}" alt="${f.name}" />
            </div>`;
        }
      });
    </script>
  </body>
</html>
