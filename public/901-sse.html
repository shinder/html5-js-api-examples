<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>901-Server Sent Event</title>
  </head>
  <body>
    <div id="info"></div>
    <script>
      const info = document.querySelector("#info");
      const es = new EventSource("/try-sse");

      es.addEventListener("open", () => {
        info.style.backgroundColor = "orange"; // 連上時改色
      });

      es.addEventListener("message", (e) => {
        // e.lastEventId 對應伺服端送的 id 欄位
        info.innerHTML = `${e.lastEventId}: ${e.data}`;
      });

      es.addEventListener("error", (e) => {
        console.log("error", e); // error 後瀏覽器會自動重連
      });
    </script>
  </body>
</html>
