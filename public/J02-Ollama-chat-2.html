<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J02-Ollama-chat-2（後端中繼 + Markdown）</title>
  </head>
  <body>
    <h2>透過後端中繼 + Markdown 渲染</h2>
    <input type="text" id="chat" value="iphone 手機有什麼特色？" size="40" />
    <button onclick="startAsk()">開始</button>
    <div id="result_div"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const startAsk = async () => {
        let content = "";
        result_div.innerHTML = "";

        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: chat.value }),
        });

        if (!response.ok) {
          result_div.innerText = "回應發生錯誤";
          return;
        }

        await readSSE(response, (event) => {
          if (event === "[DONE]") return;
          const text = JSON.parse(event); // 後端用 JSON.stringify 包過
          content += text;
          result_div.innerHTML = marked.parse(content);
        });
      };

      // 通用 SSE 解析器（給 fetch 用；同 J02-1 的 helper）
      const readSSE = async (response, onEvent) => {
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf8");
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split("\n\n");
          buffer = events.pop();
          for (const ev of events) {
            if (ev.startsWith("data: ")) onEvent(ev.slice(6));
          }
        }
      };
    </script>
  </body>
</html>
