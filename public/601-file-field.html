<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>601-檔案欄位</title>

    <style>
      .container {
        position: relative;
        width: 800px;
        height: 600px;
        background-color: #b0e9ff;
      }
    </style>
  </head>
  <body>
    <input type="file" id="fileFiled" hidden multiple accept="image/*" />
    <div class="container" onclick="fileFiled.click()">點擊選取檔案</div>

    <script>
      const container = document.querySelector(".container");
      const fileFiled = document.querySelector("#fileFiled");

      fileFiled.addEventListener("change", () => {
        for (const f of fileFiled.files) {
          // f 是 File 物件：name, type, size, lastModified
          container.innerText += `\n${f.name} (${f.size} bytes)`;
        }
      });
    </script>
  </body>
</html>
