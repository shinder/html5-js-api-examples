<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>502-drag-drop</title>
    <style>
      .rect {
        position: absolute;
        width: 200px;
        height: 200px;
        background-color: #a2eff6;
        border: 1px solid gray;
      }
      .ball {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        text-align: center;
        line-height: 60px;
        background-color: #ee6f2f;
        border: 1px solid black;
        color: white;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="rect">
      <div class="ball" draggable="true">77</div>
    </div>
    <div class="rect" style="left: 250px"></div>

    <script>
      const [, rect2] = document.querySelectorAll(".rect");

      // 進入時改色，給使用者視覺回饋
      rect2.addEventListener("dragenter", (e) => {
        e.currentTarget.style.backgroundColor = "#ffeff6";
      });
      // 一定要 preventDefault，drop 才會觸發
      rect2.addEventListener("dragover", (e) => e.preventDefault());
      // 離開或放開都要還原顏色
      rect2.addEventListener("dragleave", (e) => {
        e.currentTarget.style.backgroundColor = "#a2eff6";
      });
      rect2.addEventListener("drop", (e) => {
        e.currentTarget.style.backgroundColor = "#a2eff6";
        console.log("drop");
      });
    </script>
  </body>
</html>
