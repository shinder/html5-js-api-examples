<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>101-輸入欄位類型</title>
  </head>
  <body>
    <form onsubmit="return false;">
      <label for="myColor">顏色</label>
      <input type="color" id="myColor" /><br />

      <label for="myDate">日期</label>
      <input type="date" id="myDate" /><br />

      <label for="myEmail">電郵</label>
      <input type="email" id="myEmail" /><br />

      <label for="myRange">滑桿</label>
      <input type="range" id="myRange" min="5" max="15" step="2" /><br />

      <label for="myTel">電話</label>
      <input type="tel" id="myTel" /><br />

      <!-- 還有 datetime-local, month, number, search, time, url, week -->
      <input type="submit" />
    </form>
  </body>
</html>
