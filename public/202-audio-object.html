<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>202-audio-object</title>
  </head>
  <body>
    <button id="doLoad">載入</button>
    <button id="doPlay" style="display: none">播放或停止</button>
    <script>
      const au = new Audio();

      au.addEventListener("loadedmetadata", () => {
        console.log("已載入完成，總長度：", au.duration, "秒");
      });
      au.addEventListener("timeupdate", () => {
        console.log("目前播到：", au.currentTime);
      });
      au.addEventListener("ended", () => {
        console.log("播完了");
      });

      doLoad.onclick = () => {
        au.src = "media/196381__minitauross__panflute-loop.mp3"; // 設定 src 後才開始載入
        doLoad.style.display = "none";
        doPlay.style.display = "block";
      };
      doPlay.onclick = () => (au.paused ? au.play() : au.pause());
    </script>
  </body>
</html>
