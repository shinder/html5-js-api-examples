<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>B01-Ajax upload single</title>
  </head>
  <body>
    <form id="form1">
      <label>姓名 <input type="text" name="user" id="user" /></label><br />
      <label>大頭貼
        <input type="file" name="avatar" id="avatar" accept="image/*" />
      </label><br />
      <img id="avatar-img" width="300" /><br />
      <label>簡介
        <textarea name="description" id="description" cols="50"></textarea>
      </label><br />
      <button type="submit">上傳</button>
    </form>

    <script>
      // 1. 載入時取既有資料填回欄位
      fetch("/profile.json")
        .then((r) => (r.ok ? r.json() : {}))
        .then((obj) => {
          user.value = obj.user || "";
          description.value = obj.description || "";
          if (obj.avatar) avatarImg.src = obj.avatar;
        });

      // 2. 選檔即預覽
      avatar.addEventListener("change", () => {
        if (avatar.files[0]) {
          avatarImg.src = URL.createObjectURL(avatar.files[0]);
        }
      });

      // 3. 送出表單
      form1.addEventListener("submit", async (e) => {
        e.preventDefault();
        const res = await fetch("/uploads/profile", {
          method: "POST",
          body: new FormData(form1),
        });
        const result = await res.json();
        alert(result.success ? "上傳完成" : "上傳失敗");
      });
    </script>
  </body>
</html>
