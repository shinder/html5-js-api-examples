<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>C02-使用 worker</title>
  </head>
  <body>
    <input type="text" placeholder="測試輸入欄" />
    <button onclick="start(event)">開始算質數</button>
    <div id="info"></div>
    <script>
      const worker = new Worker("js/dedicated-worker-prime-numbers.js");

      worker.onmessage = (e) => {
        const { length, howLong } = e.data;
        info.innerHTML = `${length} 個質數, ${howLong} 毫秒`;
      };

      const start = (event) => {
        event.target.style.display = "none";
        worker.postMessage("start"); // 觸發 worker 開始算
      };
    </script>
  </body>
</html>
