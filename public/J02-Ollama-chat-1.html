<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J02-Ollama-chat-1（前端直連）</title>
  </head>
  <body>
    <h2>前端直連 Ollama</h2>
    <input type="text" id="chat" value="iphone 手機有什麼特色？" size="40" />
    <button onclick="startAsk()">開始</button>
    <div id="result_div" style="white-space: pre-wrap"></div>

    <script>
      const AI_ROLE = "您是一個出色的 3C 產品介紹員，會使用正體中文回答";

      const startAsk = async () => {
        result_div.innerText = "";

        const response = await fetch(
          "http://localhost:11434/v1/chat/completions",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "gemma3",
              messages: [
                { role: "system", content: AI_ROLE },
                { role: "user", content: chat.value },
              ],
              stream: true,
            }),
          }
        );

        if (!response.ok) {
          result_div.innerText = "回應發生錯誤";
          return;
        }

        await readSSE(response, (event) => {
          if (event === "[DONE]") return;
          const obj = JSON.parse(event); // OpenAI 相容格式：完整事件
          const text = obj.choices[0]?.delta?.content;
          if (text) result_div.innerText += text;
        });
      };

      // 通用 SSE 解析器（給 fetch 用；EventSource 是另一套）
      const readSSE = async (response, onEvent) => {
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf8");
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split("\n\n");
          buffer = events.pop(); // 最後一段可能不完整，留下次再拼
          for (const ev of events) {
            if (ev.startsWith("data: ")) onEvent(ev.slice(6));
          }
        }
      };
    </script>
  </body>
</html>
