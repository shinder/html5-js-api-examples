<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>N02 註冊 Service Worker</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#3367d6" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.6;
      }
      h1 { color: #3367d6; }
      pre {
        background: #f5f5f5;
        padding: 0.8rem;
        border-radius: 4px;
        font-size: 0.9rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>註冊 Service Worker</h1>
    <p>打開 DevTools Console 看 SW 的 lifecycle 訊息。</p>
    <p>Application → Service Workers 可以看到 SW 的狀態（installing / active / redundant）。</p>

    <pre id="log"></pre>

    <p><a href="N01-pwa-basic.html">← 回到首頁</a></p>

    <script>
      const log = document.querySelector("#log");
      const append = (msg) => (log.textContent += msg + "\n");

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then((reg) => append(`SW 註冊成功，scope: ${reg.scope}`))
          .catch((err) => append(`SW 註冊失敗: ${err.message}`));
      } else {
        append("此瀏覽器不支援 Service Worker");
      }
    </script>
  </body>
</html>
