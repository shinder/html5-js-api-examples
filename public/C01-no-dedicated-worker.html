<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>C01-沒有使用 worker</title>
  </head>
  <body>
    <input type="text" placeholder="測試輸入欄" />
    <button onclick="start(event)">開始算質數</button>
    <div id="info"></div>
    <script>
      const getPrimeNumbers = (num = 5e7) => {
        const startTime = Date.now();
        const pn = [2];
        for (let n = 3; n <= num; n++) {
          const m = Math.sqrt(n);
          let isPrime = true;
          for (const p of pn) {
            if (p > m) break;
            if (n % p === 0) {
              isPrime = false;
              break;
            }
          }
          if (isPrime) pn.push(n);
        }
        return { length: pn.length, howLong: Date.now() - startTime };
      };

      const start = (event) => {
        event.target.style.display = "none";
        const { length, howLong } = getPrimeNumbers();
        info.innerHTML = `${length} 個質數, ${howLong} 毫秒`;
      };
    </script>
  </body>
</html>
