<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A04-WebSocket chat</title>
  </head>
  <body>
    <button id="connectBtn">連線</button>
    <form id="sendForm">
      <input type="text" id="myInput" />
      <button id="sendBtn" disabled>送出</button>
    </form>
    <div id="info"></div>

    <script>
      let socket;

      connectBtn.onclick = () => {
        if (socket?.readyState === WebSocket.OPEN) return;
        socket = new WebSocket(`ws://${location.hostname}:3071`);
        socket.addEventListener("open", () => (sendBtn.disabled = false));
        socket.addEventListener("close", () => (sendBtn.disabled = true));
        socket.addEventListener(
          "message",
          (e) => (info.innerHTML += `${e.data}<br>`)
        );
      };

      sendForm.addEventListener("submit", (e) => {
        e.preventDefault();
        socket.send(myInput.value);
        myInput.value = "";
      });
    </script>
  </body>
</html>
