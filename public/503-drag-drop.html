<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>503-drag-drop</title>
    <style>
      .rect {
        position: absolute;
        width: 200px;
        height: 200px;
        background-color: #a2eff6;
        border: 1px solid gray;
      }
      .ball {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        text-align: center;
        line-height: 60px;
        background-color: #ee6f2f;
        border: 1px solid black;
        color: white;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="rect">
      <div class="ball" draggable="true" id="b77">77</div>
    </div>
    <div class="rect" style="left: 250px"></div>

    <script>
      const b = document.querySelector(".ball");
      const [, rect2] = document.querySelectorAll(".rect");

      b.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text", e.currentTarget.id); // 把 id 當資料
      });

      rect2.addEventListener("dragover", (e) => e.preventDefault());
      rect2.addEventListener("drop", (e) => {
        const tid = e.dataTransfer.getData("text");
        e.currentTarget.append(document.getElementById(tid)); // 撈回原元素，移到目標
      });
    </script>
  </body>
</html>
