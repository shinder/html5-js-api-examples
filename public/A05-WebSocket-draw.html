<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>A05-WebSocket-draw.html</title>
    <style>
      canvas {
        border: 1px dashed green;
      }
    </style>
  </head>
  <body>
    <canvas id="myCanvas" width="600" height="400"></canvas>
    <br />
    <input type="color" id="pColor" value="#0000FF" />
    <input type="number" min="1" max="50" step="1" id="pSize" value="5" /> -
    <button onclick="clearCanvas()">清空重置</button>
    <script>
      const ctx = myCanvas.getContext("2d");
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const socket = new WebSocket(`ws://${location.host}/ws/draw`);

      // 收到別人畫的線就在自己 canvas 上重畫
      socket.addEventListener("message", (e) => {
        try {
          const d = JSON.parse(e.data);
          ctx.beginPath();
          ctx.strokeStyle = d.c;
          ctx.lineWidth = d.s;
          ctx.moveTo(d.x1, d.y1);
          ctx.lineTo(d.x2, d.y2);
          ctx.stroke();
        } catch (ex) {}
      });

      // 自己畫線時：不直接 stroke，而是送 JSON 給伺服器
      const startP = { x: 0, y: 0 };

      myCanvas.addEventListener("mousedown", (e) => {
        startP.x = e.offsetX;
        startP.y = e.offsetY;
        myCanvas.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      });

      const onMove = (e) => {
        const data = {
          x1: startP.x,
          y1: startP.y,
          x2: e.offsetX,
          y2: e.offsetY,
          c: pColor.value,
          s: pSize.value,
        };
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify(data));
        }
        startP.x = e.offsetX;
        startP.y = e.offsetY;
      };
      const onUp = () => {
        myCanvas.removeEventListener("mousemove", onMove);
        window.removeEventListener("mouseup", onUp);
      };

      const clearCanvas = () =>
        ctx.clearRect(0, 0, myCanvas.width, myCanvas.height);
    </script>
  </body>
</html>
