<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L060 名稱搜尋</title>
  </head>
  <body>
    <h2>L060 名稱搜尋</h2>
    <input type="text" id="myInput" value="台北車站" placeholder="明確的地名"/>
    <button onclick="findLoc()">名稱搜尋</button><br />
    <pre id="info"></pre>

    <script>
      // 使用 Nominatim API 進行搜尋
      // 使用政策：每秒最多 1 次請求；正式應用建議自架或用付費服務
      async function geocode(address) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(
          address
        )}`;

        try {
          const response = await fetch(url);
          const data = await response.json();
          info.innerText = JSON.stringify(data, null, 2);

          if (data.length === 0) return null;

          const result = data[0];
          return {
            lat: parseFloat(result.lat),
            lon: parseFloat(result.lon),
            display_name: result.display_name,
          };
        } catch (error) {
          console.error("地理編碼錯誤:", error);
          return null;
        }
      }

      const findLoc = async () => {
        const name = document.querySelector("#myInput").value;
        const result = await geocode(name);
        if (!result) {
          alert(`找不到「${name}」`);
          return;
        }
        console.log(result);
      };
    </script>
  </body>
</html>
