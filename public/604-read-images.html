<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>604-讀取圖檔</title>
    <style>
      .container {
        position: relative;
        width: 800px;
        height: 600px;
        background-color: #b0e9ff;
      }
    </style>
  </head>
  <body>
    <input type="file" id="fileFiled" hidden multiple accept="image/*" />
    <button onclick="fileFiled.click()">加入圖片</button>
    <div class="container"></div>

    <script>
      const container = document.querySelector(".container");
      const fileFiled = document.querySelector("#fileFiled");

      fileFiled.addEventListener("change", () => {
        for (const file of fileFiled.files) {
          const reader = new FileReader();
          reader.addEventListener("load", (e) => {
            const img = new Image();
            img.height = 150;
            img.src = e.target.result; // base64 字串
            container.append(img);
          });
          reader.readAsDataURL(file);
        }
      });
    </script>
  </body>
</html>
