<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>C04-使用 shared worker 2</title>
  </head>
  <body>
    <input type="text" placeholder="測試輸入欄 2" />
    <div id="info"></div>
    <script>
      const worker = new SharedWorker("js/shared-worker-prime-numbers.js");

      worker.port.onmessage = (e) => {
        const { primeNumbers, runningTime, action } = e.data;
        const last = primeNumbers[primeNumbers.length - 1];
        info.innerHTML = `${action} - 最大質數：${last}, ${runningTime} msec`;
      };

      worker.port.postMessage("page-2");
    </script>
  </body>
</html>
