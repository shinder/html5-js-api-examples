<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>B02-Ajax upload multiple</title>
  </head>
  <body>
    <form id="form1">
      <label>選了就上傳
        <input type="file" name="photos" id="photos" accept="image/*" multiple />
      </label>
      <div id="img-container"></div>
      <textarea id="description" cols="80" rows="10" readonly></textarea>
    </form>

    <script>
      photos.addEventListener("change", async () => {
        const res = await fetch("/uploads/photos", {
          method: "POST",
          body: new FormData(form1),
        });
        const urls = await res.json();

        description.value = JSON.stringify(urls, null, 4);
        imgContainer.innerHTML = urls
          .map((url) => `<img src="${url}" width="300" />`)
          .join("");
      });
    </script>
  </body>
</html>
