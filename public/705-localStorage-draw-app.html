<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>705-localStorage 儲存圖片</title>
    <style>
      canvas {
        border: 1px dashed green;
      }
    </style>
  </head>
  <body>
    <canvas id="myCanvas" width="600" height="400"></canvas>
    <br />
    <input type="color" id="pColor" value="#0000FF" />
    <input type="number" id="pSize" min="1" max="50" step="1" value="5" />
    <button onclick="clearCanvas()">清空</button>
    <button onclick="saveCanvas()">儲存</button>
    載入
    <select id="listCombo" onchange="loadCanvas(this.value)"></select>

    <script>
      const PREFIX = "shinder-draw;;";
      const ctx = myCanvas.getContext("2d");
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // 塗鴉
      myCanvas.addEventListener("mousedown", (e) => {
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
        myCanvas.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      });
      const onMove = (e) => {
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
      };
      const onUp = () => {
        myCanvas.removeEventListener("mousemove", onMove);
        window.removeEventListener("mouseup", onUp);
      };

      // 跟著選色器/筆寬欄位變化
      const setPen = () => {
        ctx.strokeStyle = pColor.value;
        ctx.lineWidth = pSize.value;
      };
      [pColor, pSize].forEach((el) => el.addEventListener("change", setPen));
      setPen();

      const clearCanvas = () =>
        ctx.clearRect(0, 0, myCanvas.width, myCanvas.height);

      // 儲存目前 canvas 為 base64 圖檔字串
      const saveCanvas = () => {
        const dataURL = myCanvas.toDataURL("image/png");
        localStorage.setItem(PREFIX + Date.now(), dataURL);
        renewList();
      };

      // 載入指定 key 的圖到 canvas
      const loadCanvas = (key) => {
        if (!key) return;
        clearCanvas();
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = localStorage.getItem(key);
      };

      // 從 localStorage 列出所有儲存的塗鴉，更新下拉選單
      const renewList = () => {
        const items = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key.startsWith(PREFIX)) continue;
          const ts = key.slice(PREFIX.length);
          items.push({ key, date: new Date(Number(ts)).toLocaleString() });
        }
        listCombo.innerHTML =
          `<option value="">-- 選擇載入的項目 --</option>` +
          items
            .map((i) => `<option value="${i.key}">${i.date}</option>`)
            .join("");
      };
      renewList();
    </script>
  </body>
</html>
