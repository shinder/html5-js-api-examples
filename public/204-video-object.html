<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>204-video-object</title>
  </head>
  <body>
    <video id="player" controls></video>
    <div id="btnGroup">
      <button data-src="media/big-buck-bunny_trailer.webm">影片 1</button>
      <button data-src="media/elephants-dream.webm">影片 2</button>
      <button id="doPlay">播放/暫停</button>
    </div>
    <script>
      const player = document.querySelector("#player");

      player.addEventListener("loadedmetadata", () => {
        console.log("新影片載入，時長：", player.duration);
      });

      document.querySelector("#btnGroup").addEventListener("click", (e) => {
        const src = e.target.dataset.src;
        if (src) {
          player.src = src; // 切換來源 → 自動觸發 loadedmetadata
        } else if (e.target.id === "doPlay") {
          player.paused ? player.play() : player.pause();
        }
      });
    </script>
  </body>
</html>
