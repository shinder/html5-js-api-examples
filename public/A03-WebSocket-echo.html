<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A03-WebSocket echo</title>
  </head>
  <body>
    <button id="connectBtn">連線</button>
    <input type="text" id="myInput" />
    <button id="sendBtn" disabled>送出</button>
    <div id="info"></div>

    <script>
      let socket;

      connectBtn.onclick = () => {
        if (socket?.readyState === WebSocket.OPEN) return;

        socket = new WebSocket(`ws://${location.host}/ws/echo`);
        socket.addEventListener("open", () => (sendBtn.disabled = false));
        socket.addEventListener("close", () => (sendBtn.disabled = true));
        socket.addEventListener("message", (e) => {
          info.innerHTML += `${e.data}<br>`;
        });
      };

      sendBtn.onclick = () => socket.send(myInput.value);
    </script>
  </body>
</html>
