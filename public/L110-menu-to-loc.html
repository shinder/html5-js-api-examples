<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L110 選單到圖標</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      .container {
        display: flex;
      }
      .list {
        display: flex;
        flex-direction: column;
        width: 300px;
      }
      .list .item {
        margin: 2px 0;
        width: 95%;
        height: 2rem;
        text-align: center;
        line-height: 2rem;
        border-radius: 5px;
        background-color: rgb(241, 178, 90);
        color: white;
        cursor: pointer;
      }
      .list .item:hover {
        background-color: rgb(239, 162, 52);
      }
      #map {
        height: 500px;
        width: calc(100% - 300px);
      }
    </style>
  </head>
  <body>
    <h2>L110 選單到圖標</h2>
    <div class="container">
      <div class="list"></div>
      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
      const list = document.querySelector(".list");
      const taipei101 = [25.033, 121.5654];
      const map = L.map("map").setView(taipei101, 13);
      const menuMap = new Map(); // DOM 元素 → marker / 座標

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution:
          '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      const genMenu = (elements) => {
        // 隨機取 20 個 node 類型的咖啡店
        const cafes = elements
          .filter((c) => c.type === "node")
          .sort(() => Math.random() - 0.5)
          .slice(0, 20);

        for (const cafe of cafes) {
          const name = cafe.tags?.name || "咖啡店";

          const marker = L.marker([cafe.lat, cafe.lon])
            .addTo(map)
            .bindPopup(`☕  ${name}`);

          const item = document.createElement("div");
          item.className = "item";
          item.innerText = name;
          list.append(item);

          menuMap.set(item, { lat: cafe.lat, lon: cafe.lon, marker });
        }
      };

      // 事件委派：點選單項 → 開啟對應 marker 的 popup
      list.addEventListener("click", (e) => {
        const data = menuMap.get(e.target);
        if (!data) return;
        data.marker.openPopup();
        map.setView([data.lat, data.lon], 16);
      });

      fetch(`data/cafes.json`)
        .then((r) => r.json())
        .then((result) => genMenu(result.elements));
    </script>
  </body>
</html>
